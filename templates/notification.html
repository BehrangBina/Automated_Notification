<!doctype html>
<html lang="{{LANGUAGE}}" dir="{{DIRECTION}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{SUBJECT}}</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap");
    @media only screen and (max-width: 620px) {
      .email-shell { width: 100% !important; }
      .content-pad { padding: 24px 18px !important; }
      .notification-title { font-size: 25px !important; }
      .logo-image { width: 94px !important; }
      .action-button { display: block !important; text-align: center !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#eef2f7;color:#202938;direction:{{DIRECTION}};">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
    {{PREHEADER}}
  </div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
         style="width:100%;background:#eef2f7;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:28px 12px;">
        <table role="presentation" class="email-shell" width="680" cellspacing="0" cellpadding="0" border="0"
               style="width:680px;max-width:680px;background:#ffffff;border-collapse:separate;border-spacing:0;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px rgba(23,32,51,.10);font-family:Vazirmatn,Tahoma,Arial,sans-serif;">
          <tr>
            <td style="height:7px;background:{{ACCENT_COLOR}};font-size:0;line-height:0;">&nbsp;</td>
          </tr>
          <tr>
            <td class="content-pad" style="padding:28px 40px;background:#173b57;color:#ffffff;text-align:{{ALIGN}};">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
                     style="width:100%;border-collapse:collapse;">
                <tr>
                  <td width="104" valign="middle" style="width:104px;{{LOGO_SPACING}}">
                    <img class="logo-image" src="cid:parman-logo" width="90" alt="Parman"
                         style="display:block;width:90px;height:auto;border:0;">
                  </td>
                  <td valign="middle" style="text-align:{{ALIGN}};">
                    <div style="font-size:13px;font-weight:700;color:#b7d9e7;">{{ORGANIZATION_LABEL}}</div>
                    <h1 class="notification-title"
                        style="margin:8px 0 0;font-size:29px;line-height:1.55;font-weight:800;color:#ffffff;">
                      {{TITLE}}
                    </h1>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td class="content-pad"
                style="padding:34px 42px;text-align:{{ALIGN}};font-size:16px;line-height:2;">
              <div style="margin-bottom:24px;padding:13px 17px;background:{{BADGE_BACKGROUND}};border-{{BORDER_SIDE}}:4px solid {{ACCENT_COLOR}};border-radius:9px;color:#273448;font-weight:700;">
                {{TYPE_LABEL}}
              </div>
              <div style="color:#273448;">{{MESSAGE_HTML}}</div>
              {{ACTION_BLOCK}}
              <div style="margin-top:30px;padding-top:20px;border-top:1px solid #e4e9ee;color:#697586;font-size:13px;">
                {{FOOTER}}
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
